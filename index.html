<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：禁止用户缩放，确保全屏 Canvas 交互体验 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果蝇群落栖息地与生命周期客观模拟器 (移动端兼容)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; color: #eee; font-family: ui-sans-serif, system-ui, sans-serif; touch-action: none; /* 防止移动端滑动网页 */ }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        canvas { display: block; width: 100%; height: 100%; transition: background-color 0.8s; }
        
        /* 响应式 UI 容器 */
        #ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; }
        
        /* PC端布局覆盖 */
        @media (min-width: 768px) {
            #ui-layer { flex-direction: row; padding: 20px; }
            #stats-panel { width: 260px; height: fit-content; }
            #control-panel { width: 320px; height: fit-content; }
        }

        .panel { background: rgba(15, 20, 15, 0.85); backdrop-filter: blur(8px); border: 1px solid #333; border-radius: 12px; padding: 12px; pointer-events: auto; }
        
        /* 移动端底部控制面板优化 */
        #control-panel { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; font-size: 12px; }
        @media (min-width: 768px) {
            .stat-grid { display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        }
        
        .stat-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; }
        .stat-val { font-family: monospace; font-weight: bold; }
        
        input[type=range] { width: 100%; margin: 8px 0; accent-color: #4ade80; height: 6px; border-radius: 3px; outline: none; -webkit-appearance: none; background: #333; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4ade80; cursor: pointer; }

        /* 环境温度滤镜映射 */
        .temp-cold { background-color: #020617 !important; }
        .temp-optimal { background-color: #1a1e1a !important; }
        .temp-hot { background-color: #3f1515 !important; }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="habitat"></canvas>
</div>

<!-- UI 层级 -->
<div id="ui-layer">
    <!-- 种群统计面板 -->
    <div id="stats-panel" class="panel shadow-xl">
        <div class="flex justify-between items-center mb-2 md:mb-3">
            <h2 class="text-sm md:text-lg font-bold text-green-400">群落统计</h2>
            <span class="text-xs text-white font-bold bg-gray-800 px-2 py-1 rounded">成虫: <span id="count-total" class="text-green-400">0</span></span>
        </div>
        <div class="stat-grid">
            <div class="stat-item text-gray-400"><span title="Egg">🥚 卵</span> <span id="count-egg" class="stat-val">0</span></div>
            <div class="stat-item text-yellow-200"><span title="Larva">🐛 幼</span> <span id="count-larva" class="stat-val">0</span></div>
            <div class="stat-item text-orange-400"><span title="Pupa">🪲 蛹</span> <span id="count-pupa" class="stat-val">0</span></div>
            <div class="stat-item text-blue-300 md:mt-2"><span title="Adult Male">♂ 雄</span> <span id="count-male" class="stat-val">0</span></div>
            <div class="stat-item text-pink-400 md:mt-2"><span title="Adult Female">♀ 雌</span> <span id="count-female" class="stat-val">0</span></div>
            <div class="stat-item text-gray-500 md:mt-2 text-[10px] items-center">
                <span>FPS</span> <span id="fps-display" class="stat-val">60</span>
            </div>
        </div>
    </div>

    <!-- 环境控制面板 -->
    <div id="control-panel" class="panel shadow-xl mt-2 md:mt-0">
        <div class="flex justify-between items-center mb-2">
            <h2 class="text-sm md:text-lg font-bold text-yellow-400">气候控制系统</h2>
            <label class="text-xs md:text-sm flex items-center gap-1 cursor-pointer bg-gray-800 px-2 py-1 rounded">
                <input type="checkbox" id="auto-weather" checked class="accent-green-500 w-3 h-3 md:w-4 md:h-4">
                自动气候
            </label>
        </div>
        
        <div>
            <div class="flex justify-between text-xs md:text-sm mb-1">
                <span>环境温度:</span>
                <span id="temp-display" class="font-bold text-base md:text-lg text-green-400">25.0 °C</span>
            </div>
            <!-- 增加触控区域以适应移动端 -->
            <div class="py-2">
                <input type="range" id="temp-slider" min="0" max="45" value="25" step="0.5">
            </div>
            <div class="flex justify-between text-[10px] md:text-xs text-gray-500 px-1">
                <span>0°C(休眠/死)</span>
                <span>25°C(繁盛)</span>
                <span>45°C(热亡)</span>
            </div>
        </div>

        <div class="hidden md:block mt-3 text-xs text-gray-400 bg-gray-900 p-2 rounded leading-relaxed border border-gray-700">
            <strong>客观规律：</strong><br>
            >33°C 热应激致死概率飙升。<br>
            ~25°C 活跃度与代谢率最高。<br>
            <8°C 触发避寒，趋向中心果壳休眠。
        </div>
    </div>
</div>

<script>
/**
 * 2D 向量运算库
 */
class Vector2D {
    constructor(x, y) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; }
    sub(v) { return new Vector2D(this.x - v.x, this.y - v.y); }
    mult(n) { this.x *= n; this.y *= n; }
    mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    normalize() { let m = this.mag(); if (m !== 0) { this.x /= m; this.y /= m; } }
    limit(max) { if (this.mag() > max) { this.normalize(); this.mult(max); } }
    heading() { return Math.atan2(this.y, this.x); }
    static dist(v1, v2) { return Math.sqrt((v1.x - v2.x)**2 + (v1.y - v2.y)**2); }
}

// 全局配置与环境状态
const Config = {
    // 动态判断设备性能/屏幕大小：手机端降低最大承载量以保障帧率
    maxPopulation: window.innerWidth < 768 ? 150 : 300, 
    baseTickRate: window.innerWidth < 768 ? 1.5 : 1.0, // 移动端稍微加快生命周期，弥补数量少的观感
    durationEgg: 150,
    durationLarva: 500,
    durationPupa: 400,
    durationAdultMax: 3000 
};

let Env = {
    temperature: 25.0,
    time: 0,
    autoWeather: true,
    foodCenter: new Vector2D(0,0),
    foodRadius: 80
};

// 实体存储
let population = { eggs: [], larvae: [], pupae: [], adults: [] };

// DOM 元素与性能监控
const canvas = document.getElementById('habitat');
const ctx = canvas.getContext('2d');
const uiTemp = document.getElementById('temp-display');
const uiTempSlider = document.getElementById('temp-slider');
const uiAutoWeather = document.getElementById('auto-weather');
const uiFPS = document.getElementById('fps-display');

let width, height;
let lastFrameTime = performance.now();
let frames = 0;

// 初始化画布与响应式空间映射
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    // 居中放置营养源
    Env.foodCenter = new Vector2D(width / 2, height / 2);
    // 葡萄大小按屏幕最小边长的 15% 计算，确保在手机横竖屏都合适
    Env.foodRadius = Math.max(50, Math.min(width, height) * 0.15); 
}
window.addEventListener('resize', resize);
// 处理移动端屏幕旋转
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

// UI 事件绑定 (支持 Touch 和 Mouse)
uiTempSlider.addEventListener('input', (e) => {
    Env.temperature = parseFloat(e.target.value);
    uiAutoWeather.checked = false;
    Env.autoWeather = false;
    updateTempUI();
});
uiAutoWeather.addEventListener('change', (e) => {
    Env.autoWeather = e.target.checked;
});

function updateTempUI() {
    uiTemp.innerText = Env.temperature.toFixed(1) + ' °C';
    // 颜色插值预警
    if(Env.temperature > 33) uiTemp.style.color = '#ef4444'; // Red
    else if(Env.temperature < 8) uiTemp.style.color = '#3b82f6'; // Blue
    else uiTemp.style.color = '#4ade80'; // Green
}

/**
 * 实体基类
 */
class Entity {
    constructor(x, y) {
        this.pos = new Vector2D(x, y);
        this.age = 0;
        this.dead = false;
    }
    // 基础代谢率 (受温度客观规律影响)
    getMetabolicRate() {
        if (Env.temperature < 8) return 0.05;
        if (Env.temperature > 33) return 0.5;
        let rate = 1 - Math.pow((Env.temperature - 25) / 15, 2);
        return Math.max(0.1, rate);
    }
}

class Egg extends Entity {
    update() {
        this.age += this.getMetabolicRate() * Config.baseTickRate;
        if (this.age > Config.durationEgg) {
            this.dead = true;
            if (population.larvae.length + population.adults.length < Config.maxPopulation) {
                population.larvae.push(new Larva(this.pos.x, this.pos.y));
            }
        }
        if (Env.temperature > 38 || Env.temperature < 0) { if(Math.random() < 0.01) this.dead = true; }
    }
    draw(ctx) {
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(this.pos.x, this.pos.y, 2, 1, 0, 0, Math.PI*2); ctx.fill();
    }
}

class Larva extends Entity {
    constructor(x, y) {
        super(x, y);
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 0.2;
    }
    update() {
        let metaRate = this.getMetabolicRate();
        this.age += metaRate * Config.baseTickRate;
        
        if (Env.temperature > 33) { if(Math.random() < 0.005) this.dead = true; }
        if (Env.temperature < 0) { if(Math.random() < 0.001) this.dead = true; }

        if (this.age > Config.durationLarva) {
            this.dead = true;
            let dir = this.pos.sub(Env.foodCenter);
            dir.normalize(); dir.mult(Env.foodRadius * (0.8 + Math.random()*0.3));
            let pupaPos = Env.foodCenter.sub(new Vector2D(-dir.x, -dir.y));
            population.pupae.push(new Pupa(pupaPos.x, pupaPos.y));
            return;
        }

        if (Env.temperature >= 8) {
            this.angle += (Math.random() - 0.5) * 0.5;
            this.pos.x += Math.cos(this.angle) * this.speed * metaRate;
            this.pos.y += Math.sin(this.angle) * this.speed * metaRate;
            let distToCenter = Vector2D.dist(this.pos, Env.foodCenter);
            if (distToCenter > Env.foodRadius * 0.9) {
                this.angle = Env.foodCenter.sub(this.pos).heading();
            }
        }
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.pos.x, this.pos.y); ctx.rotate(this.angle);
        ctx.fillStyle = 'rgba(255, 255, 200, 0.8)';
        ctx.beginPath(); ctx.ellipse(0, 0, Math.sin(this.age * 0.1) * 1 + 3, 1.5, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class Pupa extends Entity {
    constructor(x, y) { super(x, y); this.angle = Math.random() * Math.PI * 2; }
    update() {
        this.age += this.getMetabolicRate() * Config.baseTickRate;
        if (this.age > Config.durationPupa) {
            this.dead = true;
            if (population.adults.length < Config.maxPopulation) {
                population.adults.push(new AdultFly(this.pos.x, this.pos.y, Math.random() > 0.5 ? 'male' : 'female'));
            }
        }
        if (Env.temperature > 36 || Env.temperature < -5) { if(Math.random() < 0.005) this.dead = true; }
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.pos.x, this.pos.y); ctx.rotate(this.angle);
        let progress = this.age / Config.durationPupa;
        let c = Math.floor(150 - progress * 100);
        ctx.fillStyle = `rgb(${c+50}, ${c}, ${c-20})`;
        ctx.beginPath(); ctx.ellipse(0, 0, 4, 2, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class AdultFly extends Entity {
    constructor(x, y, gender) {
        super(x, y);
        this.gender = gender;
        this.vel = new Vector2D(Math.random() * 2 - 1, Math.random() * 2 - 1);
        this.acc = new Vector2D(0, 0);
        // 移动端稍减小体型适配屏幕比例
        this.maxSpeed = gender === 'female' ? 2.0 : 2.5; 
        this.maxForce = 0.05;
        this.size = gender === 'female' ? (window.innerWidth < 768 ? 4 : 5) : (window.innerWidth < 768 ? 3 : 4); 
        
        this.state = 'WANDERING';
        this.isPregnant = false;
        this.matingCooldown = Math.random() * 100;
        this.wanderAngle = Math.random() * Math.PI * 2;
        this.targetMate = null;
        this.wingAngle = 0;
    }

    applyForce(force) { this.acc.add(force); }

    seek(targetPos) {
        let desired = targetPos.sub(this.pos);
        desired.normalize(); desired.mult(this.maxSpeed);
        let steer = desired.sub(this.vel); steer.limit(this.maxForce);
        return steer;
    }

    wander() {
        let wanderR = 20, wanderD = 60, change = 0.4;
        this.wanderAngle += (Math.random() * 2 - 1) * change;
        let circlePos = new Vector2D(this.vel.x, this.vel.y);
        circlePos.normalize(); circlePos.mult(wanderD); circlePos.add(this.pos);
        let h = this.vel.heading();
        let circleOffset = new Vector2D(wanderR * Math.cos(this.wanderAngle + h), wanderR * Math.sin(this.wanderAngle + h));
        return this.seek(new Vector2D(circlePos.x + circleOffset.x, circlePos.y + circleOffset.y));
    }

    update() {
        this.age += Config.baseTickRate;
        if (this.matingCooldown > 0) this.matingCooldown -= Config.baseTickRate;

        if (this.age > Config.durationAdultMax) this.dead = true;
        if (Env.temperature > 33) {
            if (Math.random() < Math.pow((Env.temperature - 33), 2) * 0.0005) this.dead = true;
        }

        // 环境温度强迫行为
        if (Env.temperature < 8) {
            this.state = 'HIDING';
            if (Vector2D.dist(this.pos, Env.foodCenter) > Env.foodRadius * 0.5) {
                let steer = this.seek(Env.foodCenter); steer.mult(0.5); this.applyForce(steer);
                this.maxSpeed = 0.5;
            } else {
                this.vel.mult(0); this.maxSpeed = 0;
            }
        } else {
            this.maxSpeed = this.gender === 'female' ? 2.0 : 2.5;
            if (this.state === 'HIDING') this.state = 'WANDERING';

            if (this.state === 'MATING') {
                this.vel.mult(0.9);
                if (Math.random() < 0.01) {
                    this.state = 'WANDERING';
                    if (this.gender === 'female') { this.isPregnant = true; this.matingCooldown = 500; } 
                    else { this.matingCooldown = 100; }
                    this.targetMate = null;
                }
            } else if (this.gender === 'female' && this.isPregnant) {
                this.state = 'EGG_LAYING';
                if (Vector2D.dist(this.pos, Env.foodCenter) < Env.foodRadius * 0.7) {
                    this.vel.mult(0.5);
                    if (Math.random() < 0.02) {
                        population.eggs.push(new Egg(this.pos.x, this.pos.y));
                        this.isPregnant = false; this.state = 'WANDERING';
                    }
                } else {
                    this.applyForce(this.seek(Env.foodCenter));
                }
            } else if (this.gender === 'male' && this.matingCooldown <= 0) {
                if (!this.targetMate || this.targetMate.dead || this.targetMate.state === 'MATING' || this.targetMate.isPregnant) {
                    let closestDist = Infinity, closestFemale = null;
                    for (let f of population.adults) {
                        if (f.gender === 'female' && !f.isPregnant && f.state !== 'MATING') {
                            let d = Vector2D.dist(this.pos, f.pos);
                            if (d < 150 && d < closestDist) { closestDist = d; closestFemale = f; }
                        }
                    }
                    if (closestFemale) { this.targetMate = closestFemale; this.state = 'COURTING'; }
                    else { this.state = 'WANDERING'; this.applyForce(this.wander()); }
                } else {
                    this.state = 'COURTING';
                    let d = Vector2D.dist(this.pos, this.targetMate.pos);
                    if (d < 10 && this.targetMate.matingCooldown <= 0) {
                        if (Math.random() < 0.1) { this.state = 'MATING'; this.targetMate.state = 'MATING'; }
                    } else if (d > 150) {
                        this.targetMate = null;
                    } else {
                        this.applyForce(this.seek(this.targetMate.pos));
                    }
                }
            } else {
                this.state = 'WANDERING';
                if (Math.random() < 0.1) this.applyForce(this.seek(Env.foodCenter));
                else this.applyForce(this.wander());
            }

            // 环境边界避让 (屏幕边缘)
            let margin = 30;
            if (this.pos.x < margin) this.applyForce(new Vector2D(this.maxForce * 2, 0));
            if (this.pos.x > width - margin) this.applyForce(new Vector2D(-this.maxForce * 2, 0));
            if (this.pos.y < margin) this.applyForce(new Vector2D(0, this.maxForce * 2));
            if (this.pos.y > height - margin) this.applyForce(new Vector2D(0, -this.maxForce * 2));
        }

        this.vel.add(this.acc); this.vel.limit(this.maxSpeed); this.pos.add(this.vel); this.acc.mult(0);

        if (Env.temperature < 8 || this.state === 'MATING') {
            this.wingAngle = 0;
        } else {
            this.wingAngle = Math.sin(Date.now() * 0.8 * (this.vel.mag() + 0.1)) * 0.8;
            if (this.state === 'COURTING') this.wingAngle = Math.sin(Date.now() * 0.05) * 0.5 + 0.5;
        }
    }

    draw(ctx) {
        let theta = this.vel.heading() + Math.PI / 2;
        ctx.save(); ctx.translate(this.pos.x, this.pos.y); ctx.rotate(theta);

        ctx.globalAlpha = (this.state === 'HIDING') ? 0.6 : 1.0;

        // 优化：移动端可省略一些极其微小的描边，提升 Canvas 渲染性能
        ctx.fillStyle = this.gender === 'female' ? '#d4a373' : '#283618';
        ctx.beginPath(); ctx.ellipse(0, this.size*1.2, this.size, this.size * 1.8, 0, 0, Math.PI * 2);
        if(this.isPregnant) { ctx.fillStyle = '#fff'; ctx.ellipse(0, this.size*1.2, this.size*1.2, this.size * 2.0, 0, 0, Math.PI * 2); }
        ctx.fill();
        
        ctx.fillStyle = '#606c38'; ctx.beginPath(); ctx.ellipse(0, 0, this.size*0.9, this.size, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(0, -this.size, this.size*0.7, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = "rgba(200, 220, 255, 0.4)";
        if (this.gender === 'male' && this.state === 'COURTING') {
            ctx.save(); ctx.translate(-this.size/2, 0); ctx.rotate(-Math.PI/4 - this.wingAngle); ctx.beginPath(); ctx.ellipse(0, this.size, this.size*0.8, this.size*2.5, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
            ctx.save(); ctx.translate(this.size/2, 0); ctx.rotate(0.1); ctx.beginPath(); ctx.ellipse(0, this.size*0.8, this.size*0.6, this.size*2.2, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
        } else {
            ctx.save(); ctx.translate(-this.size/2, 0); ctx.rotate(-this.wingAngle - 0.2); ctx.beginPath(); ctx.ellipse(-this.size*0.5, this.size, this.size*0.8, this.size*2.5, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
            ctx.save(); ctx.translate(this.size/2, 0); ctx.rotate(this.wingAngle + 0.2); ctx.beginPath(); ctx.ellipse(this.size*0.5, this.size, this.size*0.8, this.size*2.5, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }
        ctx.restore();
    }
}

// 初始投放第一批果蝇
function initColony() {
    for(let i=0; i<8; i++) {
        population.adults.push(new AdultFly(Env.foodCenter.x + (Math.random()-0.5)*50, Env.foodCenter.y + (Math.random()-0.5)*50, i%2===0?'female':'male'));
    }
}

function drawEnvironment() {
    if (Env.temperature < 8) canvas.className = 'temp-cold';
    else if (Env.temperature > 33) canvas.className = 'temp-hot';
    else canvas.className = 'temp-optimal';

    let grad = ctx.createRadialGradient(Env.foodCenter.x, Env.foodCenter.y, 10, Env.foodCenter.x, Env.foodCenter.y, Env.foodRadius);
    grad.addColorStop(0, '#3a1c3f'); 
    grad.addColorStop(0.5, '#4a2450');
    grad.addColorStop(1, 'rgba(40, 20, 45, 0)');
    
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(Env.foodCenter.x, Env.foodCenter.y, Env.foodRadius, 0, Math.PI*2); ctx.fill();
}

function tick(timestamp) {
    // 帧率计算
    frames++;
    if (timestamp - lastFrameTime >= 1000) {
        uiFPS.innerText = frames;
        frames = 0;
        lastFrameTime = timestamp;
    }

    ctx.clearRect(0, 0, width, height);
    
    if (Env.autoWeather) {
        Env.time += 0.002;
        Env.temperature = 20 + Math.sin(Env.time) * 16 + Math.sin(Env.time * 3.1) * 2;
        uiTempSlider.value = Env.temperature;
        updateTempUI();
    }

    drawEnvironment();

    let c1=0, c2=0, c3=0, male=0, female=0;
    ['eggs', 'larvae', 'pupae', 'adults'].forEach(key => {
        let arr = population[key];
        for (let i = arr.length - 1; i >= 0; i--) {
            arr[i].update();
            if (arr[i].dead) arr.splice(i, 1);
            else {
                arr[i].draw(ctx);
                if (key === 'eggs') c1++; else if (key === 'larvae') c2++; else if (key === 'pupae') c3++;
                else if (arr[i].gender === 'male') male++; else female++;
            }
        }
    });

    document.getElementById('count-egg').innerText = c1;
    document.getElementById('count-larva').innerText = c2;
    document.getElementById('count-pupa').innerText = c3;
    document.getElementById('count-male').innerText = male;
    document.getElementById('count-female').innerText = female;
    document.getElementById('count-total').innerText = male + female;

    requestAnimationFrame(tick);
}

// 启动
initColony();
requestAnimationFrame(tick);

</script>
</body>
</html>
